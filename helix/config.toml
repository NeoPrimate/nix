theme = "catppuccin_macchiato"
# theme = "tokyonight_storm"

[editor]
line-number = "absolute"
mouse = false
bufferline = "multiple"
# end-of-line-diagnostics = "hint"

[editor.lsp]
display-inlay-hints = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[keys.normal]
G = "goto_file_end"
X = "extend_line_above"
y = ["yank", ":clipboard-yank"]
# esc = ["collapse_selection", "keep_primary_selection"]
# y = "yank_main_selection_to_clipboard"
# p = "paste_clipboard_before"
# "C-Left" = "jump_view_left"
# "C-Right" = "jump_view_right"
# "backspace" = { r = ":sh cargo run" }

[keys.normal.g]
q = ":reflow"

[keys.normal.space]
# q = ":quit"
# w = ":write"
H = ":toggle lsp.display-inlay-hints"
# Live preview of the *focused* file via the tinymist LSP (true on-type
# update from the in-memory buffer — VSCode-equivalent). space+t+v kills
# any prior preview task, starts a new one for the current buffer on a
# fixed port, and opens the browser. space+t+p / space+t+u still pin /
# unpin main for LSP diagnostics; preview is now independent of pin.
t.v = [
  ':lsp-workspace-command tinymist.doKillPreview "ieor-preview"',
  ':lsp-workspace-command tinymist.doStartPreview "[\"--task-id\",\"ieor-preview\",\"--refresh-style\",\"onType\",\"--data-plane-host\",\"127.0.0.1:23635\",\"--partial-rendering\",\"true\",\"--invert-colors=never\",\"%{file_path_absolute}\"]"',
  ":sh open http://127.0.0.1:23635",
]
t.p = ":lsp-workspace-command tinymist.pinMain"
t.u = ":lsp-workspace-command tinymist.unpinMain"

[keys.select]
y = ["yank", ":clipboard-yank"]
p = ["paste_after", ":clipboard-paste-after"]

