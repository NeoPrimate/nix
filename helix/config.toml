theme = "catppuccin_macchiato"
# theme = "tokyonight_storm"

[editor]
line-number = "relative"
mouse = false
bufferline = "multiple"
# end-of-line-diagnostics = "hint"

[editor.lsp]
display-inlay-hints = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[keys.normal]
G = "goto_file_end"
X = "extend_line_above"
y = ["yank", ":clipboard-yank"]
# esc = ["collapse_selection", "keep_primary_selection"]
# y = "yank_main_selection_to_clipboard"
# p = "paste_clipboard_before"
# "C-Left" = "jump_view_left"
# "C-Right" = "jump_view_right"
# "backspace" = { r = ":sh cargo run" }

[keys.normal.g]
q = ":reflow"

[keys.normal.space]
# q = ":quit"
# w = ":write"
H = ":toggle lsp.display-inlay-hints"
# Live preview that follows the focused file (VSCode-equivalent
# "Preview current file"). startDefaultPreview spawns a *browsing*
# preview — its primary file auto-updates as you switch buffers, so
# you don't have to retrigger when moving between chapters. Browser
# tab on a fixed port 23635 (configured in languages.toml under
# preview.browsing.args). Re-pressing this is safe: if the preview is
# already running, the start command errors silently and helix moves
# on to reopen the URL.
t.v = [
  ":lsp-workspace-command tinymist.startDefaultPreview",
  ":sh open http://127.0.0.1:23635",
]
# Pin / unpin `main.typ` as the LSP's compilation entry — this only
# affects diagnostics and cross-file label resolution; it no longer
# affects the preview (the browsing preview ignores pin). Unpin is a
# pinMain call with JSON null. tinymist 0.14.6 requires args[0] to be
# present even when it's Option<PathBuf>, hence the explicit path /
# null. The pin path is the focused buffer's absolute path — typically
# you pin while looking at main.typ itself.
t.p = ':lsp-workspace-command tinymist.pinMain "%{file_path_absolute}"'
t.u = ":lsp-workspace-command tinymist.pinMain null"

[keys.select]
y = ["yank", ":clipboard-yank"]
p = ["paste_after", ":clipboard-paste-after"]

