theme = "catppuccin_macchiato"
# theme = "tokyonight_storm"

[editor]
line-number = "absolute"
mouse = false
bufferline = "multiple"
# end-of-line-diagnostics = "hint"

[editor.lsp]
display-inlay-hints = true

[editor.cursor-shape]
insert = "bar"
normal = "block"
select = "underline"

[editor.file-picker]
hidden = false

[keys.normal]
G = "goto_file_end"
X = "extend_line_above"
y = ["yank", ":clipboard-yank"]
# esc = ["collapse_selection", "keep_primary_selection"]
# y = "yank_main_selection_to_clipboard"
# p = "paste_clipboard_before"
# "C-Left" = "jump_view_left"
# "C-Right" = "jump_view_right"
# "backspace" = { r = ":sh cargo run" }

[keys.normal.g]
q = ":reflow"

[keys.normal.space]
# q = ":quit"
# w = ":write"
H = ":toggle lsp.display-inlay-hints"
# t = { v = ":sh open http://127.0.0.1:23635" }
t = { v = ":sh typst-preview \"%{working_directory}/%{buffer_name}\" \"%{working_directory}\"" }

[keys.select]
y = ["yank", ":clipboard-yank"]
p = ["paste_after", ":clipboard-paste-after"]

